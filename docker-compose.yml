services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llmops
      POSTGRES_PASSWORD: llmops
      POSTGRES_DB: llmops
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmops -d llmops"]
      interval: 5s
      timeout: 5s
      retries: 5

  xinference:
    image: xprobe/xinference:latest
    command: xinference-local -H 0.0.0.0
    ports:
      - "9997:9997"
    environment:
      XINFERENCE_HOME: /root/.xinference
      XINFERENCE_MODEL_SRC: modelscope
    volumes:
      - ./data/xinference:/root/.xinference
      - ./data/huggingface:/root/.cache/huggingface
    shm_size: 8gb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://llmops:llmops@postgres:5432/llmops
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
